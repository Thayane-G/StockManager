<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>StockManager</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- HOME -->
<div id="home" class="home">
    <h1>☕ Bem-vindo ao StockManager</h1>
    <p>Controle simples e rápido de produtos</p>

    <button id="btnEntrar">Entrar no sistema</button>
</div>

<!-- APP -->
<div id="app" class="container hidden">

    <h1>📦 Gestão de Produtos</h1>

    <form id="form">
        <input type="text" id="nome" placeholder="Nome">
        <input type="text" id="categoria" placeholder="Categoria">
        <input type="number" id="preco" placeholder="Preço">
        <input type="number" id="quantidade" placeholder="Quantidade">
        <button type="submit">Salvar</button>
    </form>

    <div class="search-box">
        <input type="text" id="busca" placeholder="Buscar produto...">
    </div>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nome</th>
                <th>Categoria</th>
                <th>Preço</th>
                <th>Quantidade</th>
                <th>Ações</th>
            </tr>
        </thead>

        <tbody id="tabela"></tbody>
    </table>

</div>

<!-- TOAST -->
<div id="toast" class="toast hidden"></div>

<script src="script.js"></script>

</body>
</html>
